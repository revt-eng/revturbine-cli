name: Release

# Publishes the `@revturbine/cli` package to the PUBLIC npm registry when a v*
# tag is pushed. The tag drives the release; the published version is
# package.json's version. Requires the NPM_TOKEN secret (an npm automation token
# with publish rights under the `revturbine` npm org). `--access public` is
# required because the package is scoped. (Trusted publishing / OIDC can replace
# the token once @revturbine/cli exists and a trusted-publisher rule is set.)

on:
  push:
    tags:
      - 'v*'

permissions:
  contents: read
  id-token: write # npm provenance

jobs:
  publish:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 20
          registry-url: 'https://registry.npmjs.org'
          cache: npm
      - run: npm ci
      - run: npm run verify
      - run: npm run build
      - name: Guard — tag must match package.json version
        run: |
          PKG_VERSION="v$(node -p "require('./package.json').version")"
          if [ "$GITHUB_REF_NAME" != "$PKG_VERSION" ]; then
            echo "::error::Tag $GITHUB_REF_NAME does not match package.json ($PKG_VERSION). Bump package.json and re-tag."
            exit 1
          fi
      - name: Publish to public npm
        run: npm publish --access public --provenance
        env:
          NODE_AUTH_TOKEN: ${{ secrets.NPM_TOKEN }}
