name: Release

# Publishes `@revturbine/revt-config` to the PUBLIC npm registry when a v* tag is
# pushed, using npm TRUSTED PUBLISHING (OIDC) — no NPM_TOKEN secret. npm trusts
# this workflow's GitHub OIDC identity based on a trusted-publisher rule
# configured on the package (npmjs.com → @revturbine/revt-config → Settings →
# Trusted Publisher: GitHub Actions, org `revt-eng`, repo `revturbine-cli`,
# workflow `release.yml`). Provenance is generated automatically.
#
# Requirements: `id-token: write` permission (below) and npm CLI >= 11.5.1
# (Node 20 ships an older npm, so we upgrade it in a step). The tag drives the
# release; the published version is package.json's version.

on:
  push:
    tags:
      - 'v*'

permissions:
  contents: read
  id-token: write # OIDC token for npm trusted publishing + provenance

jobs:
  publish:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 20
          registry-url: 'https://registry.npmjs.org'
          cache: npm
      - name: Upgrade npm (trusted publishing needs npm >= 11.5.1)
        run: npm install -g npm@latest
      - run: npm ci
      - run: npm run verify
      - run: npm run build
      - name: Guard — tag must match package.json version
        run: |
          PKG_VERSION="v$(node -p "require('./package.json').version")"
          if [ "$GITHUB_REF_NAME" != "$PKG_VERSION" ]; then
            echo "::error::Tag $GITHUB_REF_NAME does not match package.json ($PKG_VERSION). Bump package.json and re-tag."
            exit 1
          fi
      - name: Publish to public npm (OIDC trusted publishing)
        run: npm publish --access public
