name: PR gate

on:
  push:
    branches: [main]
  pull_request:

jobs:
  verify:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm
      - run: npm ci
      - run: npm run typecheck
      - run: npm run lint
      - run: npm run test
      - run: npm run build

  smoke:
    # Proves the published binary validates configs with NO workspace siblings
    # present (scaffold/demo-data absent) — i.e. fully standalone (plan 100 AC-2/AC-3).
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm
      - run: npm ci
      - run: npm run build
      - name: validate a valid config (expect exit 0)
        run: node dist/cli.js validate tests/fixtures/valid.export-config.json
      - name: validate an invalid config (expect exit 4)
        run: |
          if node dist/cli.js validate tests/fixtures/invalid.export-config.json; then
            echo "::error::invalid config unexpectedly passed validation"
            exit 1
          fi
          echo "invalid config correctly rejected"
      - name: --version reports CLI + schema versions
        run: node dist/cli.js --version
      - name: help snapshot — the 0.5.x surface, nothing retired (plan 131 AC-3)
        run: |
          HELP=$(node dist/cli.js --help)
          for cmd in login logout signup whoami schema docs download validate diff show upload launch discard restore status history preview evaluate; do
            echo "$HELP" | grep -qE "^  $cmd" || { echo "::error::missing command '$cmd' in --help"; exit 1; }
          done
          for gone in promote submit approve reject deploy rollback verify export; do
            if echo "$HELP" | grep -qE "^  $gone( |\[|<)"; then
              echo "::error::retired command '$gone' still in --help"; exit 1
            fi
          done
          echo "help surface matches the 0.5.x spec"
