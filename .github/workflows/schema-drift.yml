name: Schema drift

# Re-generates the vendored ExportedConfigSchema snapshot from the canonical
# scaffold source and fails if the checked-in snapshot is stale. Requires read
# access to the private revturbine-scaffold repo via the SCHEMA_SYNC_TOKEN
# secret; skips cleanly when the secret is absent (e.g. fork PRs), so the public
# gate never hard-depends on private access.

on:
  push:
    branches: [main]
  pull_request:
  schedule:
    - cron: '0 13 * * 1' # Mondays — catch upstream schema bumps
  workflow_dispatch:

jobs:
  drift:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Check for scaffold access token
        id: gate
        run: |
          if [ -n "${{ secrets.SCHEMA_SYNC_TOKEN }}" ]; then
            echo "have_token=true" >> "$GITHUB_OUTPUT"
          else
            echo "have_token=false" >> "$GITHUB_OUTPUT"
            echo "::notice::SCHEMA_SYNC_TOKEN absent — skipping schema-drift check."
          fi
      - uses: actions/setup-node@v4
        if: steps.gate.outputs.have_token == 'true'
        with:
          node-version: 20
          cache: npm
      - name: Checkout scaffold (canonical schema source)
        if: steps.gate.outputs.have_token == 'true'
        uses: actions/checkout@v4
        with:
          repository: revt-eng/revturbine-scaffold
          token: ${{ secrets.SCHEMA_SYNC_TOKEN }}
          path: .scaffold
      - name: Regenerate snapshot from scaffold
        if: steps.gate.outputs.have_token == 'true'
        run: |
          npm ci
          npm run generate:schema -- --scaffold-dir "$PWD/.scaffold"
      - name: Fail if the vendored snapshot is stale
        if: steps.gate.outputs.have_token == 'true'
        run: |
          if ! git diff --exit-code -- src/schema/exported-config.snapshot.mjs src/schema/SCHEMA_VERSION src/schema/version.ts; then
            echo "::error::Vendored schema snapshot is out of date. Run 'npm run generate:schema' and commit the result."
            exit 1
          fi
          echo "Vendored schema snapshot is current."
